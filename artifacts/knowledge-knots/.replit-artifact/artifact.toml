kind = "web"
previewPath = "/"
title = "Knowledge Knots"
version = "1.0.0"
id = "artifacts/knowledge-knots"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21484

[services.development]
run = "pnpm --filter @workspace/knowledge-knots run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/knowledge-knots", "run", "build" ]
publicDir = "artifacts/knowledge-knots/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21484"
BASE_PATH = "/"
